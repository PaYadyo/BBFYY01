<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Booking</title>
    <link rel="stylesheet" href="/public/css/styles.css">
    <link href="/public/image/png/favicon.png" rel="icon" type="image/png">
    <link href="/public/image/x-icon/favicon.ico" rel="icon" type="image/x-icon">

    <script type="module" src="/src/index.js"></script>
</head>

<body class="bbfyy01-head">

    <script>
        if (localStorage.getItem("theme") === 'dark') {
            document.body.classList.add("dark-mode");
        } else {
            document.body.classList.remove("dark-mode");
        }
    </script>

    <header class="bbfyy01-title-barheader"> 
        <div class="header-text">
            <h1 class="head-txt">Welcome to Badminton Booking</h1>
            <p class="sub-txt">You can book your badminton court here</p>
        </div>

        <div class="title-side" style="position: relative;"> <button id="setting-toggle" class="btn btn-icon">⚙️</button>
            
            <div id="setting-menu" class="setting-box">
                <h3 style="margin-bottom: 10px; color: var(--text-head);">⚙️ แผงตั้งค่า</h3>
                
                <button id="theme-toggle" class="btn btn-outline" style="width: 100%;">🌙 เปลี่ยนสีพื้นหลัง</button>
            </div>

            <a href="/public/login.html" class="btn btn-outline">Login</a>
            <a href="/public/register.html" class="btn btn-primary">Register</a>
        </div>
    </header>
</body>
</html>
